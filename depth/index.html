<style>
:root{

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

var EXAG=3, KM=0.001, FT=0.3048;
var DESK=window.matchMedia('(min-width:1000px)').matches;
var STEP=DESK?3:5;

var canvas=document.getElementById('scene');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(50,1,0.05,400);
var controls=new OrbitControls(camera,canvas);
controls.enableDamping=true;controls.dampingFactor=0.06;
controls.maxPolarAngle=Math.PI*0.49;controls.minDistance=2;controls.maxDistance=90;
controls.autoRotate=true;controls.autoRotateSpeed=0.6;
canvas.addEventListener('pointerdown',function(){intro.done=true;controls.autoRotate=false;document.getElementById('hint').style.opacity=0;});

var meta,waterMeshes={},surfaces={},liveDeficit={keowee:0,jocassee:0};
var drainFt=0,samp=null,landmarks=[],drainAnim=null,terrUniforms=null;
var intro={t0:null,dur:4200,from:null,to:null,done:false};
var LM=[
  ['Sassafras Mtn',35.0648,-82.7772,'peak'],
  ['Whitewater Falls',35.0361,-83.0178,'peak'],
  ['Lake Jocassee',34.965,-82.925,'water'],
  ['Lake Keowee',34.78,-82.905,'water'],
  ['Seneca',34.6857,-82.9532,'town'],
  ['Clemson',34.6834,-82.8374,'town'],
  ['Salem',34.8887,-82.9749,'town'],
  ['Walhalla',34.7649,-83.0640,'town'],
  ['Six Mile',34.8043,-82.8179,'town'],
  ['Devils Fork SP',34.9506,-82.9469,'peak']
];

var GLSL_RAMPS=`
vec3 rampLand(float h){
  vec3 c=vec3(0.071,0.247,0.212);
  c=mix(c,vec3(0.102,0.361,0.298),smoothstep(150.,300.,h));
  c=mix(c,vec3(0.180,0.478,0.373),smoothstep(300.,500.,h));
  c=mix(c,vec3(0.435,0.643,0.510),smoothstep(500.,750.,h));
  c=mix(c,vec3(0.788,0.796,0.627),smoothstep(750.,950.,h));
  c=mix(c,vec3(0.953,0.929,0.871),smoothstep(950.,1120.,h));
  return c;
}
vec3 rampDepth(float d){
  vec3 c=vec3(0.561,0.910,0.847);
  c=mix(c,vec3(0.298,0.788,0.706),smoothstep(0.,10.,d));
  c=mix(c,vec3(0.106,0.561,0.627),smoothstep(10.,30.,d));
  c=mix(c,vec3(0.055,0.302,0.431),smoothstep(30.,60.,d));
  c=mix(c,vec3(0.027,0.122,0.200),smoothstep(60.,95.,d));
  return c;
}
`;

Promise.all([
  fetch('meta.json').then(function(r){return r.json();}),
  new Promise(function(res,rej){var im=new Image();im.onload=function(){res(im);};im.onerror=rej;im.src='basin.png';})
]).then(function(vals){
  meta=vals[0];
  build(vals[1]);
  document.getElementById('load').style.display='none';
}).catch(function(){
  document.getElementById('load').innerHTML='<span>Could not load the basin — try a refresh.</span>';
});

function build(img){
  var W=meta.width,H=meta.height,f=meta.frame;
  var cv=document.createElement('canvas');cv.width=W;cv.height=H;
  var cx2=cv.getContext('2d',{willReadFrequently:true});
  cx2.drawImage(img,0,0);
  var px=cx2.getImageData(0,0,W,H).data;
  var midLat=(f[1]+f[3])/2;
  var resX=(f[2]-f[0])/W*111320*Math.cos(midLat*Math.PI/180);
  var resY=(f[3]-f[1])/H*110540;
  surfaces.keowee=meta.lakes.keowee.surface_m;
  surfaces.jocassee=meta.lakes.jocassee.surface_m;

  function at(ix,iy){var i=(iy*W+ix)*4;return{e:(px[i]*256+px[i+1])*meta.elev_scale_m-meta.elev_offset_m,m:px[i+2]};}
  samp={W:W,H:H,resX:resX,resY:resY,at:at,
    world:function(wx,wz){var ix=Math.round(wx/(resX*KM)+W/2),iy=Math.round(wz/(resY*KM)+H/2);
      if(ix<0||iy<0||ix>=W||iy>=H)return null;return at(ix,iy);},
    fromLL:function(lon,lat){var ix=(lon-f[0])/(f[2]-f[0])*W,iy=(f[3]-lat)/(f[3]-f[1])*H;
      return{x:(ix-W/2)*resX*KM,z:(iy-H/2)*resY*KM,e:at(Math.round(ix),Math.round(iy)).e};}};

  // single-channel data textures: float elevation (linear), byte mask (nearest + linear copy)
  var n=W*H,elevF=new Float32Array(n),maskB=new Uint8Array(n);
  var kSum=[0,0,0];
  for(var i=0;i<n;i++){
    elevF[i]=(px[i*4]*256+px[i*4+1])*meta.elev_scale_m-meta.elev_offset_m;
    maskB[i]=px[i*4+2];
    if(maskB[i]===120&&(i&7)===0){
      kSum[0]+=((i%W)-W/2)*resX*KM;kSum[1]+=(Math.floor(i/W)-H/2)*resY*KM;kSum[2]++;
    }
  }
  function dt(data,fmt,type,filter){
    var t=new THREE.DataTexture(data,W,H,fmt,type);
    t.magFilter=filter;t.minFilter=filter;t.needsUpdate=true;return t;
  }
  var floatLinear=renderer.capabilities.isWebGL2&&renderer.extensions.get('OES_texture_float_linear');
  var uElev=dt(elevF,THREE.RedFormat,THREE.FloatType,floatLinear?THREE.LinearFilter:THREE.NearestFilter);
  var uMaskN=dt(maskB,THREE.RedFormat,THREE.UnsignedByteType,THREE.NearestFilter);
  var uMaskL=dt(maskB,THREE.RedFormat,THREE.UnsignedByteType,THREE.LinearFilter);

  var shared={uElev:{value:uElev},uMaskN:{value:uMaskN},uMaskL:{value:uMaskL},
    uTexel:{value:new THREE.Vector2(1/W,1/H)},
    uSlope:{value:new THREE.Vector2(EXAG*KM/(2*resX*KM),EXAG*KM/(2*resY*KM))},
    uSurfK:{value:surfaces.keowee},uSurfJ:{value:surfaces.jocassee},
    uWaterYK:{value:surfaces.keowee},uWaterYJ:{value:surfaces.jocassee},
    uSun:{value:new THREE.Vector3(-0.55,0.62,0.46).normalize()}};
  terrUniforms=shared;

  // terrain: coarse grid geometry, per-pixel shading
  var gw=Math.floor((W-1)/STEP)+1,gh=Math.floor((H-1)/STEP)+1;
  var pos=new Float32Array(gw*gh*3),uv=new Float32Array(gw*gh*2);
  for(var gy=0;gy<gh;gy++)for(var gx=0;gx<gw;gx++){
    var s=at(gx*STEP,gy*STEP),vi=(gy*gw+gx);
    pos[vi*3]=(gx*STEP-W/2)*resX*KM;pos[vi*3+1]=s.e*EXAG*KM;pos[vi*3+2]=(gy*STEP-H/2)*resY*KM;
    uv[vi*2]=gx*STEP/(W-1);uv[vi*2+1]=gy*STEP/(H-1);
  }
  var idx=[];
  for(gy=0;gy<gh-1;gy++)for(gx=0;gx<gw-1;gx++){
    var a=gy*gw+gx,b=a+1,c=a+gw,d=c+1;idx.push(a,c,b,b,c,d);
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('uv',new THREE.BufferAttribute(uv,2));
  g.setIndex(idx);
  var terrMat=new THREE.ShaderMaterial({
    transparent:true,
    uniforms:shared,
    vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
    fragmentShader:GLSL_RAMPS+`
      varying vec2 vUv;
      uniform sampler2D uElev,uMaskN,uMaskL;
      uniform vec2 uTexel,uSlope;
      uniform float uSurfK,uSurfJ,uWaterYK,uWaterYJ;
      uniform vec3 uSun;
      void main(){
        float h=texture2D(uElev,vUv).r;
        float hR=texture2D(uElev,vUv+vec2(uTexel.x,0.)).r,hL=texture2D(uElev,vUv-vec2(uTexel.x,0.)).r;
        float hD=texture2D(uElev,vUv+vec2(0.,uTexel.y)).r,hU=texture2D(uElev,vUv-vec2(0.,uTexel.y)).r;
        vec3 nrm=normalize(vec3(-(hR-hL)*uSlope.x,1.,-(hD-hU)*uSlope.y));
        float mN=texture2D(uMaskN,vUv).r*255.;
        vec3 col;
        if(mN>1.){
          float surf=mN>180.?uSurfJ:uSurfK;
          float wY=mN>180.?uWaterYJ:uWaterYK;
          float lv=mN>180.?240.:120.;
          float edge=smoothstep(.25,.75,texture2D(uMaskL,vUv).r*255./lv);
          float above=h-wY;
          vec3 wet=rampDepth(surf-h);
          vec3 dry=mix(rampLand(h),vec3(.72,.65,.48),.6);
          vec3 bed=above>0.?mix(dry,vec3(.84,.77,.58),smoothstep(5.,0.,above)):wet;
          col=mix(rampLand(h),bed,edge);
        }else{
          float lv2=texture2D(uMaskL,vUv).r*255.;
          col=mix(rampLand(h),rampDepth(1.5),clamp(lv2/120.,0.,.5));
        }
        float dif=max(dot(nrm,uSun),0.);
        float hemi=mix(.45,1.,nrm.y*.5+.5);
        col*=(.35*hemi+.85*dif);
        float ea=smoothstep(0.,.055,vUv.x)*smoothstep(0.,.055,1.-vUv.x)
                *smoothstep(0.,.075,vUv.y)*smoothstep(0.,.075,1.-vUv.y);
        gl_FragColor=vec4(col,ea);
      }`});
  scene.add(new THREE.Mesh(g,terrMat));

  // water: one plane per lake, clipped and tinted per pixel
  [['keowee',120],['jocassee',240]].forEach(function(pair){
    var name=pair[0],lv=pair[1];
    var minx=W,maxx=0,miny=H,maxy=0;
    for(var yy=0;yy<H;yy+=2)for(var xx=0;xx<W;xx+=2){
      if(maskB[yy*W+xx]===lv){if(xx<minx)minx=xx;if(xx>maxx)maxx=xx;if(yy<miny)miny=yy;if(yy>maxy)maxy=yy;}
    }
    minx=Math.max(0,minx-4);miny=Math.max(0,miny-4);maxx=Math.min(W-1,maxx+4);maxy=Math.min(H-1,maxy+4);
    var wgeo=new THREE.BufferGeometry();
    var wp=[],wu=[];
    [[minx,miny],[maxx,miny],[minx,maxy],[maxx,maxy]].forEach(function(p){
      wp.push((p[0]-W/2)*resX*KM,0,(p[1]-H/2)*resY*KM);
      wu.push(p[0]/(W-1),p[1]/(H-1));
    });
    wgeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(wp),3));
    wgeo.setAttribute('uv',new THREE.BufferAttribute(new Float32Array(wu),2));
    wgeo.setIndex([0,2,1,1,2,3]);
    var wmat=new THREE.ShaderMaterial({
      transparent:true,depthWrite:false,
      uniforms:THREE.UniformsUtils.merge([{
        uElev:{value:null},uMaskN:{value:null},uMaskL:{value:null},
        uLakeVal:{value:lv},uWaterY:{value:0},uTime:{value:0},uSun:{value:null},uCam:{value:new THREE.Vector3()}
      }]),
      vertexShader:'varying vec2 vUv;varying vec3 vW;void main(){vUv=uv;vec4 w=modelMatrix*vec4(position,1.);vW=w.xyz;gl_Position=projectionMatrix*viewMatrix*w;}',
      fragmentShader:GLSL_RAMPS+`
        varying vec2 vUv;varying vec3 vW;
        uniform sampler2D uElev,uMaskN,uMaskL;
        uniform float uLakeVal,uWaterY,uTime;
        uniform vec3 uSun,uCam;
        void main(){
          float mN=texture2D(uMaskN,vUv).r*255.;
          if(abs(mN-uLakeVal)>40.)discard;
          float bed=texture2D(uElev,vUv).r;
          float depth=uWaterY-bed;
          if(depth<=0.02)discard;
          float edge=smoothstep(.30,.70,texture2D(uMaskL,vUv).r*255./uLakeVal);
          float shore=smoothstep(0.,.9,depth);
          vec2 w=vW.xz*80.;
          float t=uTime;
          vec3 n=normalize(vec3(
            sin(w.x+t*.9)+sin(w.y*.7-t*.6)+sin((w.x+w.y)*.4+t*.4),
            26.,
            cos(w.x*.8-t*.7)+cos(w.y*1.3+t*.5)+cos((w.x-w.y)*.5+t*.3)));
          vec3 col=rampDepth(min(depth,95.))*1.12+vec3(.02,.10,.08);
          col+=n.x*.02;
          vec3 v=normalize(uCam-vW);
          vec3 hf=normalize(v+uSun);
          float spec=pow(max(dot(n,hf),0.),150.);
          col+=vec3(.95,.97,.9)*spec*.85;
          float a=(.42+.28*smoothstep(0.,25.,depth))*edge*shore;
          a=min(1.,a+spec*.3);
          gl_FragColor=vec4(col,a);
        }`});
    wmat.uniforms.uElev.value=uElev;
    wmat.uniforms.uMaskN.value=uMaskN;
    wmat.uniforms.uMaskL.value=uMaskL;
    wmat.uniforms.uSun.value=shared.uSun.value;
    var wm=new THREE.Mesh(wgeo,wmat);
    wm.renderOrder=2;
    scene.add(wm);
    waterMeshes[name]=wm;
  });
  updateWater();

  var stage=canvas.parentElement;
  LM.forEach(function(l){
    var p=samp.fromLL(l[2],l[1]);
    var el=document.createElement('div');
    el.className='lm'+(l[3]==='water'?' water':'');
    el.innerHTML=l[0]+(l[3]==='peak'?'<i></i>':'');
    stage.appendChild(el);
    var y=(l[3]==='water'?surfaces[l[0].indexOf('Jocassee')>=0?'jocassee':'keowee']:p.e);
    landmarks.push({el:el,pos:new THREE.Vector3(p.x,(y+40)*EXAG*KM,p.z)});
  });

  var kc=new THREE.Vector3(kSum[0]/kSum[2],surfaces.keowee*EXAG*KM,kSum[1]/kSum[2]);
  controls.target.copy(kc);
  homeCam(kc);
  intro.to=camera.position.clone();
  intro.from=kc.clone().add(new THREE.Vector3(30,44,58));
  intro.t0=performance.now();
  camera.position.copy(intro.from);
  resize();
  renderer.setAnimationLoop(frame);
}

function frame(){
  if(!intro.done&&intro.t0){
    var t=(performance.now()-intro.t0)/intro.dur;
    if(t>=1){intro.done=true;}
    else{
      t=t*t*(3-2*t);
      camera.position.lerpVectors(intro.from,intro.to,t);
      camera.position.y+=Math.sin(Math.PI*t)*2.2;
      camera.lookAt(controls.target);
    }
  }
  if(intro.done)controls.update();
  tickDrain();
  tickLabels();
  var tm=performance.now()/1000;
  Object.keys(waterMeshes).forEach(function(k){
    var u=waterMeshes[k].material.uniforms;
    u.uCam.value.copy(camera.position);
    u.uTime.value=tm;
  });
  renderer.render(scene,camera);
}

function tickLabels(){
  if(!landmarks.length)return;
  camera.updateMatrixWorld();
  camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
  var w=canvas.clientWidth,h=canvas.clientHeight,v=new THREE.Vector3();
  landmarks.forEach(function(l){
    v.copy(l.pos).project(camera);
    if(v.z<1&&Math.abs(v.x)<1.02&&Math.abs(v.y)<1.02){
      l.el.style.display='block';
      l.el.style.left=((v.x*0.5+0.5)*w)+'px';
      l.el.style.top=((-v.y*0.5+0.5)*h)+'px';
    }else l.el.style.display='none';
  });
}

function homeCam(t){
  camera.position.set(t.x+14,t.y+11,t.z+17);
  controls.target.copy(t);
}
document.getElementById('resetView').addEventListener('click',function(){
  if(controls.target)homeCam(controls.target.clone());
  controls.autoRotate=true;
});

function updateWater(){
  Object.keys(waterMeshes).forEach(function(name){
    var elev=surfaces[name]-(liveDeficit[name]+drainFt)*FT;
    waterMeshes[name].position.y=elev*EXAG*KM;
    waterMeshes[name].material.uniforms.uWaterY.value=elev;
    if(terrUniforms)terrUniforms[name==='keowee'?'uWaterYK':'uWaterYJ'].value=elev;
  });
}
var drain=document.getElementById('drain'),drainOut=document.getElementById('drainOut');
drain.addEventListener('input',function(){
  if(drainAnim){drainAnim=null;document.getElementById('drainPlay').textContent='Drain it';}
  drainFt=parseFloat(drain.value)||0;
  drainOut.textContent=drainFt===0?'Full pond':'−'+drainFt+' ft';
  updateWater();
});

function tickDrain(){
  if(!drainAnim)return;
  var e=(performance.now()-drainAnim)/1000,v;
  function ss(t){t=Math.max(0,Math.min(1,t));return t*t*(3-2*t);}
  if(e<4.5)v=ss(e/4.5)*300;
  else if(e<6)v=300;
  else if(e<10.5)v=300*(1-ss((e-6)/4.5));
  else{v=0;drainAnim=null;document.getElementById('drainPlay').textContent='Drain it';}
  drainFt=Math.round(v/5)*5;
  drain.value=drainFt;
  drainOut.textContent=drainFt===0?'Full pond':'−'+drainFt+' ft';
  updateWater();
}
document.getElementById('drainPlay').addEventListener('click',function(){
  if(drainAnim){drainAnim=null;this.textContent='Drain it';}
  else{drainAnim=performance.now();this.textContent='Stop';}
});

var probe=document.getElementById('probe');
function probeAt(clientX,clientY){
  if(!samp||!meta)return probe.style.display='none';
  var r=canvas.getBoundingClientRect();
  var nx=((clientX-r.left)/r.width)*2-1,ny=-((clientY-r.top)/r.height)*2+1;
  var dir=new THREE.Vector3(nx,ny,0.5).unproject(camera).sub(camera.position).normalize();
  var hit=null;
  ['keowee','jocassee'].forEach(function(name){
    if(hit)return;
    var planeY=surfaces[name]*EXAG*KM;
    var t=(planeY-camera.position.y)/dir.y;
    if(t<=0)return;
    var p=camera.position.clone().addScaledVector(dir,t);
    var s=samp.world(p.x,p.z);
    if(s&&((name==='keowee'&&s.m===120)||(name==='jocassee'&&s.m===240)))
      hit={ft:Math.round((surfaces[name]-s.e)/FT)};
  });
  if(hit&&hit.ft>=3){
    probe.textContent='≈ '+hit.ft+' ft deep';
    probe.style.display='block';
    probe.style.left=(clientX-r.left)+'px';
    probe.style.top=(clientY-r.top)+'px';
  }else probe.style.display='none';
}
canvas.addEventListener('pointermove',function(e){
  if(e.buttons!==0){probe.style.display='none';return;}
  probeAt(e.clientX,e.clientY);
});
canvas.addEventListener('pointerleave',function(){probe.style.display='none';});

fetch('https://api.hydro-derived.duke-energy.app/lakes/current-level')
  .then(function(r){if(!r.ok)throw 0;return r.json();})
  .then(function(lakes){
    [['keowee','KEOWEE'],['jocassee','JOCASSEE']].forEach(function(p){
      var l=lakes.find(function(x){return x.LakeName===p[1];});
      var a=l&&parseFloat(l.Actual);
      if(a&&!isNaN(a))liveDeficit[p[0]]=Math.max(0,100-a);
    });
    var d=liveDeficit.keowee;
    document.getElementById('liveText').textContent='Live · Keowee '+(d<=0.1?'at full pond':(Math.round(d*10)/10)+' ft below full');
    updateWater();
  })
  .catch(function(){
    document.getElementById('liveText').textContent='Live level unavailable · showing full pond';
  });

// debug/testing hook: lets tools without requestAnimationFrame drive frames
window.__depth={frame:frame,
  dbg:function(){return{cam:camera.position.toArray(),tgt:controls.target.toArray()};}};

function resize(){
  var st=canvas.parentElement.getBoundingClientRect();
  renderer.setSize(st.width,st.height,false);
  camera.aspect=st.width/st.height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
resize();
</script>
