name: Deploy Pages

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview
          path: preview

      - name: Assemble site (main at root, preview under /preview/)
        run: |
          mkdir -p _site/preview
          rsync -a --exclude='.git' --exclude='.github' main/ _site/
          rsync -a --exclude='.git' --exclude='.github' preview/ _site/preview/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
