:root{

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}

.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;gap:12px}
.wordmark{font-family:var(--display);font-weight:800;font-size:1.25rem;letter-spacing:-.02em;text-decoration:none;display:flex;flex-direction:column;line-height:1}
.wordmark span{color:var(--clearwater)}

.pennant-logo{width:112px;height:auto;display:block;filter:drop-shadow(0 5px 12px rgba(6,40,33,.4))}

.nav-cta:hover{background:#ff5a3a}

.mapbar-label{font-family:var(--mono);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#8FBFB5;margin-right:4px;white-space:nowrap}

.card-links a{font-family:var(--mono);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-decoration:none;padding:9px 14px;border-radius:999px;border:1.5px solid var(--clearwater);color:var(--keowee-deep);transition:background .15s ease}

.sheet-close{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;border:none;background:rgba(6,40,33,.35);color:#fff;font-size:1.05rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-close:hover{background:rgba(6,40,33,.55)}
@media(max-width:600px){

  .sheet{max-width:none;border-radius:var(--radius-lg) var(--radius-lg) 0 0;animation-name:sheetUp}

  .chip-count{display:none}

@media(prefers-reduced-motion:reduce){.sheet{animation:none}.pin{transition:none}}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function(){
  var dataEl=document.getElementById('spotData');
  if(!dataEl||typeof L==='undefined')return;
  var spots=JSON.parse(dataEl.textContent);

  var map=L.map('map',{scrollWheelZoom:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    maxZoom:19
  }).addTo(map);

  // Sheet (same experience as the rest of the site)
  var overlay=document.getElementById('sheetOverlay'),sheetEl=document.getElementById('sheet'),lastFocus=null;
  function openSheet(id){
    var s=spots[id];if(!s)return;
    var h='<div class="sheet-art art-'+s.art+'" aria-hidden="true">'+s.emoji+'</div>';
    h+='<button class="sheet-close" aria-label="Close">✕</button>';
    h+='<div class="sheet-body">';
    h+='<div class="tags">';
    if(s.town)h+='<span class="tag '+s.townClass+'">'+s.town+'</span>';
    if(s.category)h+='<span class="tag '+s.catClass+'">'+s.category+'</span>';
    h+='</div>';
    h+='<h3>'+s.name+'</h3>';
    h+='<p>'+s.blurb+'</p>';
    if(s.tip)h+='<p class="tip"><b>Pro tip:</b> '+s.tip+'</p>';
    if(s.badges.length)h+='<p class="badges">'+s.badges.join(' · ')+'</p>';
    h+='<div class="card-links">';
    if(s.website)h+='<a href="'+s.website+'" target="_blank" rel="noopener">'+(s.website.indexOf('facebook.com')>-1?'Facebook':'Website')+'</a>';
    h+='<a href="'+s.maps+'" target="_blank" rel="noopener">Directions</a>';
    h+='</div></div>';
    sheetEl.innerHTML=h;
    lastFocus=document.activeElement;
    overlay.classList.add('open');
    sheetEl.querySelector('.sheet-close').focus();
  }
  function closeSheet(){
    overlay.classList.remove('open');
    if(lastFocus)lastFocus.focus();
  }
  document.addEventListener('click',function(e){
    if(e.target.closest('.sheet-close')){closeSheet();return;}
    if(e.target===overlay){closeSheet();return;}
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'&&overlay.classList.contains('open'))closeSheet();
  });

  // Markers
  var markers={};
  Object.keys(spots).forEach(function(id){
    var s=spots[id];
    if(!s.lat||!s.lng)return;
    var icon=L.divIcon({className:'',html:'<div class="pin art-'+s.art+' '+(s.typeClass||'')+'">'+s.emoji+'</div>',iconSize:[32,32],iconAnchor:[16,29],popupAnchor:[0,-26]});
    var m=L.marker([s.lat,s.lng],{icon:icon,title:s.name.replace(/&amp;/g,'&')});
    m.on('click',function(){openSheet(id);});
    markers[id]=m;
    m.addTo(map);
  });

  function fitVisible(){
    var pts=[];
    Object.keys(markers).forEach(function(id){
      if(map.hasLayer(markers[id]))pts.push(markers[id].getLatLng());
    });
    if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(0.12),{maxZoom:13});
  }
  // First load frames the lake itself: far-flung Sights stay just off-frame
  function fitCore(){
    var pts=[];
    Object.keys(markers).forEach(function(id){
      if(spots[id].type!=='Sights')pts.push(markers[id].getLatLng());
    });
    if(pts.length)map.fitBounds(L.latLngBounds(pts).pad(0.08),{maxZoom:11});
    else fitVisible();
  }

  // Filter chips (by type; generated from data)
  var bar=document.getElementById('mapChips'),countEl=document.getElementById('chipCount');
  var types=[];
  Object.keys(spots).forEach(function(id){
    var t=spots[id].type;
    if(t&&types.indexOf(t)<0)types.push(t);
  });
  function addChip(label,value){
    var b=document.createElement('button');
    b.className='chip'+(value===''?' is-active':'');
    b.textContent=label;
    b.setAttribute('data-type',value);
    bar.insertBefore(b,countEl);
  }
  addChip('All','');
  types.forEach(function(t){addChip(t,t);});
  function updateCount(n){countEl.textContent=(n<10?'0':'')+n+' spots';}
  updateCount(Object.keys(markers).length);
  bar.addEventListener('click',function(e){
    var chip=e.target.closest('.chip');
    if(!chip)return;
    bar.querySelectorAll('.chip').forEach(function(c){c.classList.remove('is-active');});
    chip.classList.add('is-active');
    var ty=chip.getAttribute('data-type'),n=0;
    Object.keys(markers).forEach(function(id){
      var show=!ty||spots[id].type===ty;
      if(show){markers[id].addTo(map);n++;}
      else map.removeLayer(markers[id]);
    });
    updateCount(n);
    fitVisible();
  });

  // Fit after layout settles (fitting too early computes zoom for a 0-height box)
  function initialView(){
    map.invalidateSize();
    var hash=location.hash.replace('#','');
    if(hash&&markers[hash]){
      map.setView(markers[hash].getLatLng(),15);
      markers[hash].openPopup();
    }else{
      fitCore();
    }
  }
  requestAnimationFrame(function(){requestAnimationFrame(initialView);});
  window.addEventListener('load',initialView,{once:true});
})();
</script>
